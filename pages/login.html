<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Personal Finance Tracker</title>
    <link rel="icon" type="image/x-icon" href="../assets/logo.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-page="login" data-path-prefix="../">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="../assets/logo.png" alt="Finance Tracker Logo" />
          <h1>Finance Tracker</h1>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-section">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-subtitle">Sign in to your account</p>

          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="login-username">Username</label>
              <input
                type="text"
                id="login-username"
                placeholder="Enter your username"
                autocomplete="username"
                required
              />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
            </div>
            <p class="auth-error" id="login-error" aria-live="polite"></p>
            <button type="submit" class="btn btn--auth">Sign In</button>
          </form>

          <p class="auth-switch">
            Don't have an account?
            <button type="button" class="auth-link" id="show-register">
              Register here
            </button>
          </p>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-section" class="auth-hidden">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-subtitle">Start tracking your finances</p>

          <form id="register-form" novalidate>
            <div class="form-group">
              <label for="reg-username">Username</label>
              <input
                type="text"
                id="reg-username"
                placeholder="Choose a username (min 3 chars)"
                autocomplete="username"
                required
              />
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input
                type="password"
                id="reg-password"
                placeholder="Choose a password (min 6 chars)"
                autocomplete="new-password"
                required
              />
            </div>
            <div class="form-group">
              <label for="reg-confirm">Confirm Password</label>
              <input
                type="password"
                id="reg-confirm"
                placeholder="Repeat your password"
                autocomplete="new-password"
                required
              />
            </div>
            <p class="auth-error" id="register-error" aria-live="polite"></p>
            <button type="submit" class="btn btn--auth">Create Account</button>
          </form>

          <p class="auth-switch">
            Already have an account?
            <button type="button" class="auth-link" id="show-login">
              Sign in here
            </button>
          </p>
        </div>

        <p class="auth-disclaimer">⚠️ Demo only — data is stored locally in your browser.</p>
      </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
      const loginSection = document.getElementById("login-section");
      const registerSection = document.getElementById("register-section");

      document.getElementById("show-register").addEventListener("click", () => {
        loginSection.classList.add("auth-hidden");
        registerSection.classList.remove("auth-hidden");
      });

      document.getElementById("show-login").addEventListener("click", () => {
        registerSection.classList.add("auth-hidden");
        loginSection.classList.remove("auth-hidden");
      });

      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("login-username").value;
        const password = document.getElementById("login-password").value;
        const errorEl = document.getElementById("login-error");
        const result = Auth.login(username, password);
        if (result.success) {
          window.location.replace("../index.html");
        } else {
          errorEl.textContent = result.message;
        }
      });

      document
        .getElementById("register-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const username = document.getElementById("reg-username").value;
          const password = document.getElementById("reg-password").value;
          const confirm = document.getElementById("reg-confirm").value;
          const errorEl = document.getElementById("register-error");

          if (password !== confirm) {
            errorEl.textContent = "Passwords do not match.";
            return;
          }

          const result = Auth.register(username, password);
          if (result.success) {
            const loginResult = Auth.login(username, password);
            if (loginResult.success) {
              window.location.replace("../index.html");
            } else {
              errorEl.textContent = loginResult.message;
            }
          } else {
            errorEl.textContent = result.message;
          }
        });
    </script>
  </body>
</html>
